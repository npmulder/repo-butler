name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.6.5
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm generate:schema-types
      - run: pnpm validate:schemas
      - run: pnpm lint
      - run: pnpm tsc --noEmit
      - run: pnpm build
        env:
          NEXT_PUBLIC_CONVEX_URL: https://placeholder.convex.cloud
          WORKOS_CLIENT_ID: client_placeholder
          WORKOS_API_KEY: sk_test_placeholder
          WORKOS_COOKIE_PASSWORD: 0123456789abcdef0123456789abcdef
          NEXT_PUBLIC_WORKOS_REDIRECT_URI: http://localhost:3000/api/auth/callback
